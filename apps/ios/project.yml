name: Autopus
options:
  bundleIdPrefix: ai.autopus
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_APP_INTENTS_METADATA_GENERATION: NO

packages:
  AutopusKit:
    path: ../shared/AutopusKit
  Swabble:
    path: ../swabble

schemes:
  Autopus:
    shared: true
    build:
      targets:
        Autopus: all
    test:
      targets:
        - AutopusTests
        - AutopusLogicTests
  AutopusLogicTests:
    shared: true
    build:
      targets:
        AutopusLogicTests: all
    test:
      targets:
        - AutopusLogicTests

targets:
  Autopus:
    type: application
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Sources
    dependencies:
      - target: AutopusShareExtension
        embed: true
      - target: AutopusActivityWidget
        embed: true
      - target: AutopusWatchApp
      - package: AutopusKit
      - package: AutopusKit
        product: AutopusChatUI
      - package: AutopusKit
        product: AutopusProtocol
      - package: Swabble
        product: SwabbleKit
      - sdk: AppIntents.framework
    preBuildScripts:
      - name: SwiftFormat (lint)
        basedOnDependencyAnalysis: false
        inputFileLists:
          - $(SRCROOT)/SwiftSources.input.xcfilelist
        script: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if ! command -v swiftformat >/dev/null 2>&1; then
            echo "error: swiftformat not found (brew install swiftformat)" >&2
            exit 1
          fi
          swiftformat --lint --config "$SRCROOT/../../config/swiftformat" \
            --unexclude "$SRCROOT/Sources,$SRCROOT/ShareExtension,$SRCROOT/ActivityWidget,$SRCROOT/WatchExtension,$SRCROOT/../shared/AutopusKit,$SRCROOT/../swabble" \
            --filelist "$SRCROOT/SwiftSources.input.xcfilelist"
      - name: SwiftLint
        basedOnDependencyAnalysis: false
        inputFileLists:
          - $(SRCROOT)/SwiftSources.input.xcfilelist
        script: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if ! command -v swiftlint >/dev/null 2>&1; then
            echo "error: swiftlint not found (brew install swiftlint)" >&2
            exit 1
          fi
          swiftlint lint --config "$SRCROOT/.swiftlint.yml" --use-script-input-file-lists
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_ENTITLEMENTS: Sources/Autopus.entitlements
        CODE_SIGN_STYLE: "$(AUTOPUS_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(AUTOPUS_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(AUTOPUS_APP_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(AUTOPUS_APP_PROFILE)"
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        SUPPORTS_LIVE_ACTIVITIES: YES
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
      configs:
        Debug:
          AUTOPUS_PUSH_TRANSPORT: direct
          AUTOPUS_PUSH_DISTRIBUTION: local
          AUTOPUS_PUSH_RELAY_BASE_URL: ""
          AUTOPUS_PUSH_APNS_ENVIRONMENT: sandbox
        Release:
          AUTOPUS_PUSH_TRANSPORT: direct
          AUTOPUS_PUSH_DISTRIBUTION: local
          AUTOPUS_PUSH_RELAY_BASE_URL: ""
          AUTOPUS_PUSH_APNS_ENVIRONMENT: production
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: Autopus
        CFBundleIconName: AppIcon
        CFBundleURLTypes:
          - CFBundleURLName: ai.autopus.ios
            CFBundleURLSchemes:
              - autopus
        CFBundleShortVersionString: "$(AUTOPUS_MARKETING_VERSION)"
        AutopusCanonicalVersion: "$(AUTOPUS_IOS_VERSION)"
        CFBundleVersion: "$(AUTOPUS_BUILD_VERSION)"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIBackgroundModes:
          - audio
          - remote-notification
        BGTaskSchedulerPermittedIdentifiers:
          - ai.autopus.ios.bgrefresh
        NSLocalNetworkUsageDescription: Autopus discovers and connects to your Autopus gateway on the local network.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoadsInWebContent: true
        NSBonjourServices:
          - _autopus-gw._tcp
        NSCameraUsageDescription: Autopus can capture photos or short video clips when requested via the gateway.
        NSCalendarsUsageDescription: Autopus uses your calendars to show events and scheduling context when you enable calendar access.
        NSCalendarsFullAccessUsageDescription: Autopus uses your calendars to show events and scheduling context when you enable calendar access.
        NSCalendarsWriteOnlyAccessUsageDescription: Autopus uses your calendars to add events when you enable calendar access.
        NSContactsUsageDescription: Autopus uses your contacts so you can search and reference people while using the assistant.
        NSLocationWhenInUseUsageDescription: Autopus uses your location when you allow location sharing.
        NSLocationAlwaysAndWhenInUseUsageDescription: Autopus can share your location in the background when you enable Always.
        NSMicrophoneUsageDescription: Autopus needs microphone access for voice wake.
        NSMotionUsageDescription: Autopus may use motion data to support device-aware interactions and automations.
        NSPhotoLibraryUsageDescription: Autopus needs photo library access when you choose existing photos to share with your assistant.
        NSRemindersFullAccessUsageDescription: Autopus uses your reminders to list, add, and complete tasks when you enable reminders access.
        NSSpeechRecognitionUsageDescription: Autopus uses on-device speech recognition for voice wake.
        NSSupportsLiveActivities: true
        ITSAppUsesNonExemptEncryption: false
        AutopusPushTransport: "$(AUTOPUS_PUSH_TRANSPORT)"
        AutopusPushDistribution: "$(AUTOPUS_PUSH_DISTRIBUTION)"
        AutopusPushRelayBaseURL: "$(AUTOPUS_PUSH_RELAY_BASE_URL)"
        AutopusPushAPNsEnvironment: "$(AUTOPUS_PUSH_APNS_ENVIRONMENT)"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

  AutopusShareExtension:
    type: app-extension
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: ShareExtension
    dependencies:
      - package: AutopusKit
      - sdk: AppIntents.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(AUTOPUS_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(AUTOPUS_DEVELOPMENT_TEAM)"
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        PRODUCT_BUNDLE_IDENTIFIER: "$(AUTOPUS_SHARE_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(AUTOPUS_SHARE_PROFILE)"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: ShareExtension/Info.plist
      properties:
        CFBundleDisplayName: Autopus Share
        CFBundleShortVersionString: "$(AUTOPUS_MARKETING_VERSION)"
        CFBundleVersion: "$(AUTOPUS_BUILD_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).ShareViewController"
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsText: true
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsImageWithMaxCount: 10
              NSExtensionActivationSupportsMovieWithMaxCount: 1

  AutopusActivityWidget:
    type: app-extension
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: ActivityWidget
      - path: Sources/LiveActivity/AutopusActivityAttributes.swift
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: ActivityKit.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(AUTOPUS_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(AUTOPUS_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(AUTOPUS_ACTIVITY_WIDGET_BUNDLE_ID)"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        SUPPORTS_LIVE_ACTIVITIES: YES
    info:
      path: ActivityWidget/Info.plist
      properties:
        CFBundleDisplayName: Autopus Activity
        CFBundleShortVersionString: "$(AUTOPUS_MARKETING_VERSION)"
        CFBundleVersion: "$(AUTOPUS_BUILD_VERSION)"
        NSSupportsLiveActivities: true
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  AutopusWatchApp:
    type: application.watchapp2
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: WatchApp
    dependencies:
      - target: AutopusWatchExtension
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    attributes:
      DevelopmentTeam: "$(AUTOPUS_DEVELOPMENT_TEAM)"
      ProvisioningStyle: "$(AUTOPUS_CODE_SIGN_STYLE)"
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(AUTOPUS_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(AUTOPUS_DEVELOPMENT_TEAM)"
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        PRODUCT_BUNDLE_IDENTIFIER: "$(AUTOPUS_WATCH_APP_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(AUTOPUS_WATCH_APP_PROFILE)"
    info:
      path: WatchApp/Info.plist
      properties:
        CFBundleDisplayName: Autopus
        CFBundleShortVersionString: "$(AUTOPUS_MARKETING_VERSION)"
        CFBundleVersion: "$(AUTOPUS_BUILD_VERSION)"
        WKCompanionAppBundleIdentifier: "$(AUTOPUS_APP_BUNDLE_ID)"
        WKWatchKitApp: true

  AutopusWatchExtension:
    type: watchkit2-extension
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: WatchExtension/Sources
    dependencies:
      - sdk: AppIntents.framework
      - sdk: WatchConnectivity.framework
      - sdk: UserNotifications.framework
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    attributes:
      DevelopmentTeam: "$(AUTOPUS_DEVELOPMENT_TEAM)"
      ProvisioningStyle: "$(AUTOPUS_CODE_SIGN_STYLE)"
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(AUTOPUS_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(AUTOPUS_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(AUTOPUS_WATCH_EXTENSION_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(AUTOPUS_WATCH_EXTENSION_PROFILE)"
    info:
      path: WatchExtension/Info.plist
      properties:
        CFBundleDisplayName: Autopus
        CFBundleShortVersionString: "$(AUTOPUS_MARKETING_VERSION)"
        CFBundleVersion: "$(AUTOPUS_BUILD_VERSION)"
        NSExtension:
          NSExtensionAttributes:
            WKAppBundleIdentifier: "$(AUTOPUS_WATCH_APP_BUNDLE_ID)"
          NSExtensionPointIdentifier: com.apple.watchkit

  AutopusTests:
    type: bundle.unit-test
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Tests
        excludes:
          - Logic
    dependencies:
      - target: Autopus
      - package: Swabble
        product: SwabbleKit
      - sdk: AppIntents.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(AUTOPUS_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(AUTOPUS_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: ai.autopus.ios.tests
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Autopus.app/Autopus"
        BUNDLE_LOADER: "$(TEST_HOST)"
    info:
      path: Tests/Info.plist
      properties:
        CFBundleDisplayName: AutopusTests
        CFBundleShortVersionString: "$(AUTOPUS_MARKETING_VERSION)"
        CFBundleVersion: "$(AUTOPUS_BUILD_VERSION)"

  AutopusLogicTests:
    type: bundle.unit-test
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Tests/Logic
    dependencies:
      - package: AutopusKit
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(AUTOPUS_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(AUTOPUS_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: ai.autopus.ios.logic-tests
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        SWIFT_EMIT_CONST_VALUE_PROTOCOLS: ""
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: Tests/Info.plist
      properties:
        CFBundleDisplayName: AutopusLogicTests
        CFBundleShortVersionString: "$(AUTOPUS_MARKETING_VERSION)"
        CFBundleVersion: "$(AUTOPUS_BUILD_VERSION)"
