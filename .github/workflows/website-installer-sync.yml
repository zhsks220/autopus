name: Website Installer Sync

on:
  pull_request:
    paths:
      - scripts/install.sh
      - scripts/install-cli.sh
      - scripts/install.ps1
      - .github/workflows/website-installer-sync.yml
  push:
    branches: [main]
    paths:
      - scripts/install.sh
      - scripts/install-cli.sh
      - scripts/install.ps1
      - .github/workflows/website-installer-sync.yml
  workflow_dispatch:
    inputs:
      sync_website:
        description: Sync autopus.ai after verification
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: website-installer-sync-${{ github.event_name == 'workflow_dispatch' && github.run_id || github.ref }}
  cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  static:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install ShellCheck
        run: sudo apt-get update -y && sudo apt-get install -y shellcheck

      - name: Shell syntax
        run: bash -n scripts/install.sh scripts/install-cli.sh

      - name: ShellCheck
        run: shellcheck -e SC1091 scripts/install.sh scripts/install-cli.sh

      - name: Installer help and dry-runs
        run: |
          bash scripts/install.sh --help >/tmp/install-help.txt
          bash scripts/install.sh --dry-run --no-onboard --no-prompt
          bash scripts/install-cli.sh --help >/tmp/install-cli-help.txt

      - name: PowerShell syntax
        shell: pwsh
        run: |
          $errors = $null
          $null = [System.Management.Automation.PSParser]::Tokenize(
            (Get-Content -Raw scripts/install.ps1),
            [ref]$errors
          )
          if ($errors -and $errors.Count -gt 0) {
            $errors | Format-List | Out-String | Write-Error
            exit 1
          }

  linux-docker:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: install.sh in Docker
        run: |
          docker run --rm \
            -e AUTOPUS_NO_ONBOARD=1 \
            -e AUTOPUS_NO_PROMPT=1 \
            -v "$PWD/scripts/install.sh:/tmp/install.sh:ro" \
            node:24-bookworm-slim \
            bash -lc 'bash /tmp/install.sh --no-prompt --no-onboard --version latest && autopus --version'

      - name: install-cli.sh in Docker
        run: |
          docker run --rm \
            -e AUTOPUS_NO_ONBOARD=1 \
            -e AUTOPUS_NO_PROMPT=1 \
            -v "$PWD/scripts/install-cli.sh:/tmp/install-cli.sh:ro" \
            node:24-bookworm-slim \
            bash -lc 'apt-get update -y && apt-get install -y curl && bash /tmp/install-cli.sh --prefix /tmp/autopus --no-onboard --version latest && /tmp/autopus/bin/autopus --version'

  macos-installer:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: install.sh dry run
        run: bash scripts/install.sh --dry-run --no-onboard --no-prompt

      - name: install.sh on macOS
        env:
          AUTOPUS_NO_ONBOARD: "1"
          AUTOPUS_NO_PROMPT: "1"
        run: |
          bash scripts/install.sh --no-onboard --no-prompt --version latest
          autopus --version

  windows-installer:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: install.ps1 dry run
        shell: pwsh
        run: .\scripts\install.ps1 -DryRun -NoOnboard -InstallMethod npm

  sync-website:
    needs: [static, linux-docker, macos-installer, windows-installer]
    if: >
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.sync_website)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Autopus
        uses: actions/checkout@v6
        with:
          path: autopus

      - name: Checkout autopus.ai
        uses: actions/checkout@v6
        with:
          repository: autopus/autopus.ai
          token: ${{ secrets.AUTOPUS_GH_TOKEN }}
          path: autopus.ai

      - name: Sync installer scripts
        run: |
          cp autopus/scripts/install.sh autopus.ai/public/install.sh
          cp autopus/scripts/install-cli.sh autopus.ai/public/install-cli.sh
          cp autopus/scripts/install.ps1 autopus.ai/public/install.ps1
          rm -f autopus.ai/public/install.cmd
          chmod +x autopus.ai/public/install.sh autopus.ai/public/install-cli.sh

      - name: Check for changes
        id: changes
        working-directory: autopus.ai
        run: |
          if git diff --quiet -- public/install.sh public/install-cli.sh public/install.ps1 public/install.cmd; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Bun
        if: steps.changes.outputs.changed == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        if: steps.changes.outputs.changed == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install ShellCheck
        if: steps.changes.outputs.changed == 'true'
        run: sudo apt-get update -y && sudo apt-get install -y shellcheck

      - name: Verify website with synced installers
        if: steps.changes.outputs.changed == 'true'
        working-directory: autopus.ai
        run: |
          bash -n public/install.sh public/install-cli.sh
          shellcheck -e SC1091 public/install.sh public/install-cli.sh
          bun install --frozen-lockfile
          bun run build

      - name: Commit and push website sync
        if: steps.changes.outputs.changed == 'true'
        working-directory: autopus.ai
        run: |
          git config user.name "autopus-installer-sync[bot]"
          git config user.email "autopus-installer-sync[bot]@users.noreply.github.com"
          git add public/install.sh public/install-cli.sh public/install.ps1
          if git ls-files --error-unmatch public/install.cmd >/dev/null 2>&1; then
            git add -u -- public/install.cmd
          fi
          git commit -m "chore: sync installers from autopus ${GITHUB_SHA::12}"
          git pull --rebase origin main
          git push origin HEAD:main
