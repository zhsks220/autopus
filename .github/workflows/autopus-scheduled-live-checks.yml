name: Autopus Scheduled Live And E2E Checks

on:
  schedule:
    - cron: "23 4 * * *"
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  pull-requests: read

concurrency:
  group: autopus-scheduled-live-checks-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  live_and_openwebui_checks:
    permissions:
      contents: read
      packages: write
      pull-requests: read
    uses: ./.github/workflows/autopus-live-and-e2e-checks-reusable.yml
    with:
      ref: ${{ github.sha }}
      include_repo_e2e: true
      include_release_path_suites: true
      include_openwebui: true
      include_live_suites: true
    secrets:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ANTHROPIC_API_KEY_OLD: ${{ secrets.ANTHROPIC_API_KEY_OLD }}
      ANTHROPIC_API_TOKEN: ${{ secrets.ANTHROPIC_API_TOKEN }}
      BYTEPLUS_API_KEY: ${{ secrets.BYTEPLUS_API_KEY }}
      CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
      DEEPINFRA_API_KEY: ${{ secrets.DEEPINFRA_API_KEY }}
      DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
      MODELSTUDIO_API_KEY: ${{ secrets.MODELSTUDIO_API_KEY }}
      MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}
      MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
      MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
      OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
      OPENCODE_ZEN_API_KEY: ${{ secrets.OPENCODE_ZEN_API_KEY }}
      AUTOPUS_LIVE_BROWSER_CDP_URL: ${{ secrets.AUTOPUS_LIVE_BROWSER_CDP_URL }}
      AUTOPUS_LIVE_SETUP_TOKEN: ${{ secrets.AUTOPUS_LIVE_SETUP_TOKEN }}
      AUTOPUS_LIVE_SETUP_TOKEN_MODEL: ${{ secrets.AUTOPUS_LIVE_SETUP_TOKEN_MODEL }}
      AUTOPUS_LIVE_SETUP_TOKEN_PROFILE: ${{ secrets.AUTOPUS_LIVE_SETUP_TOKEN_PROFILE }}
      AUTOPUS_LIVE_SETUP_TOKEN_VALUE: ${{ secrets.AUTOPUS_LIVE_SETUP_TOKEN_VALUE }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
      FAL_KEY: ${{ secrets.FAL_KEY }}
      RUNWAY_API_KEY: ${{ secrets.RUNWAY_API_KEY }}
      DEEPGRAM_API_KEY: ${{ secrets.DEEPGRAM_API_KEY }}
      TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
      VYDRA_API_KEY: ${{ secrets.VYDRA_API_KEY }}
      XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
      ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}
      Z_AI_API_KEY: ${{ secrets.Z_AI_API_KEY }}
      BYTEPLUS_ACCESS_KEY_ID: ${{ secrets.BYTEPLUS_ACCESS_KEY_ID }}
      BYTEPLUS_SECRET_ACCESS_KEY: ${{ secrets.BYTEPLUS_SECRET_ACCESS_KEY }}
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      AUTOPUS_CODEX_AUTH_JSON: ${{ secrets.AUTOPUS_CODEX_AUTH_JSON }}
      AUTOPUS_CODEX_CONFIG_TOML: ${{ secrets.AUTOPUS_CODEX_CONFIG_TOML }}
      AUTOPUS_CLAUDE_JSON: ${{ secrets.AUTOPUS_CLAUDE_JSON }}
      AUTOPUS_CLAUDE_CREDENTIALS_JSON: ${{ secrets.AUTOPUS_CLAUDE_CREDENTIALS_JSON }}
      AUTOPUS_CLAUDE_SETTINGS_JSON: ${{ secrets.AUTOPUS_CLAUDE_SETTINGS_JSON }}
      AUTOPUS_CLAUDE_SETTINGS_LOCAL_JSON: ${{ secrets.AUTOPUS_CLAUDE_SETTINGS_LOCAL_JSON }}
      AUTOPUS_GEMINI_SETTINGS_JSON: ${{ secrets.AUTOPUS_GEMINI_SETTINGS_JSON }}
      FIREWORKS_API_KEY: ${{ secrets.FIREWORKS_API_KEY }}
