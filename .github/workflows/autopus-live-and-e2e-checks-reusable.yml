      AUTOPUS_CLAUDE_SETTINGS_JSON: ${{ secrets.AUTOPUS_CLAUDE_SETTINGS_JSON }}
      AUTOPUS_CLAUDE_SETTINGS_LOCAL_JSON: ${{ secrets.AUTOPUS_CLAUDE_SETTINGS_LOCAL_JSON }}
      AUTOPUS_GEMINI_SETTINGS_JSON: ${{ secrets.AUTOPUS_GEMINI_SETTINGS_JSON }}
      FIREWORKS_API_KEY: ${{ secrets.FIREWORKS_API_KEY }}
      AUTOPUS_LIVE_VIDEO_GENERATION_SKIP_PROVIDERS: ""
      AUTOPUS_LIVE_VYDRA_VIDEO: "1"
      AUTOPUS_VITEST_MAX_WORKERS: "2"
    steps:
      - name: Checkout selected ref
        if: contains(matrix.profiles, inputs.release_test_profile) && (inputs.live_suite_filter == '' || inputs.live_suite_filter == matrix.suite_id || (inputs.live_suite_filter == 'native-live-extensions-media-video' && startsWith(matrix.suite_id, 'native-live-extensions-media-video-')))
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.validate_selected_ref.outputs.selected_sha }}
          fetch-depth: 1

      - name: Checkout trusted live shard harness
        if: contains(matrix.profiles, inputs.release_test_profile) && (inputs.live_suite_filter == '' || inputs.live_suite_filter == matrix.suite_id || (inputs.live_suite_filter == 'native-live-extensions-media-video' && startsWith(matrix.suite_id, 'native-live-extensions-media-video-')))
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1
          path: .release-harness

      - name: Verify preinstalled live media dependencies
        if: contains(matrix.profiles, inputs.release_test_profile) && (inputs.live_suite_filter == '' || inputs.live_suite_filter == matrix.suite_id || (inputs.live_suite_filter == 'native-live-extensions-media-video' && startsWith(matrix.suite_id, 'native-live-extensions-media-video-')))
        shell: bash
        run: |
          set -euo pipefail
          ffmpeg -version | head -1
          ffprobe -version | head -1

      - name: Setup Node environment
        if: contains(matrix.profiles, inputs.release_test_profile) && (inputs.live_suite_filter == '' || inputs.live_suite_filter == matrix.suite_id || (inputs.live_suite_filter == 'native-live-extensions-media-video' && startsWith(matrix.suite_id, 'native-live-extensions-media-video-')))
        uses: ./.github/actions/setup-node-env
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}
          install-bun: "true"

      - name: Hydrate live auth/profile inputs
        if: contains(matrix.profiles, inputs.release_test_profile) && (inputs.live_suite_filter == '' || inputs.live_suite_filter == matrix.suite_id || (inputs.live_suite_filter == 'native-live-extensions-media-video' && startsWith(matrix.suite_id, 'native-live-extensions-media-video-')))
        run: bash scripts/ci-hydrate-live-auth.sh

      - name: Configure suite-specific env
        if: contains(matrix.profiles, inputs.release_test_profile) && (inputs.live_suite_filter == '' || inputs.live_suite_filter == matrix.suite_id || (inputs.live_suite_filter == 'native-live-extensions-media-video' && startsWith(matrix.suite_id, 'native-live-extensions-media-video-')))
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ matrix.profile_env_only }}" == "true" ]]; then
            echo "AUTOPUS_DOCKER_PROFILE_ENV_ONLY=1" >> "$GITHUB_ENV"
          fi

      - name: Run ${{ matrix.label }}
        if: contains(matrix.profiles, inputs.release_test_profile) && (inputs.live_suite_filter == '' || inputs.live_suite_filter == matrix.suite_id || (inputs.live_suite_filter == 'native-live-extensions-media-video' && startsWith(matrix.suite_id, 'native-live-extensions-media-video-')))
        env:
          AUTOPUS_LIVE_SUITE_ADVISORY: ${{ matrix.advisory }}
        run: |
          set +e
          ${{ matrix.command }}
          status=$?
          set -e
          if [[ "$status" -eq 0 ]]; then
            exit 0
          fi
          if [[ "${AUTOPUS_LIVE_SUITE_ADVISORY:-}" == "true" ]]; then
            echo "::warning::Advisory live suite failed with exit code ${status}: ${{ matrix.suite_id }}"
            exit 0
          fi
          exit "$status"
