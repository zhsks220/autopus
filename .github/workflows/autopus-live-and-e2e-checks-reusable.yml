    steps:
      - name: Checkout selected ref
        if: contains(matrix.profiles, inputs.release_test_profile) && (inputs.live_suite_filter == '' || inputs.live_suite_filter == matrix.suite_id || (inputs.live_suite_filter == 'live-gateway-advisory-docker' && startsWith(matrix.suite_id, 'live-gateway-advisory-docker-')))
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.validate_selected_ref.outputs.selected_sha }}
          fetch-depth: 1

      - name: Checkout trusted live shard harness
        if: contains(matrix.profiles, inputs.release_test_profile) && (inputs.live_suite_filter == '' || inputs.live_suite_filter == matrix.suite_id || (inputs.live_suite_filter == 'live-gateway-advisory-docker' && startsWith(matrix.suite_id, 'live-gateway-advisory-docker-')))
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1
          path: .release-harness

      - name: Setup Node environment
        if: contains(matrix.profiles, inputs.release_test_profile) && (inputs.live_suite_filter == '' || inputs.live_suite_filter == matrix.suite_id || (inputs.live_suite_filter == 'live-gateway-advisory-docker' && startsWith(matrix.suite_id, 'live-gateway-advisory-docker-')))
        uses: ./.github/actions/setup-node-env
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}
          install-bun: "true"

      - name: Hydrate live auth/profile inputs
        if: contains(matrix.profiles, inputs.release_test_profile) && (inputs.live_suite_filter == '' || inputs.live_suite_filter == matrix.suite_id || (inputs.live_suite_filter == 'live-gateway-advisory-docker' && startsWith(matrix.suite_id, 'live-gateway-advisory-docker-')))
        run: bash scripts/ci-hydrate-live-auth.sh

      - name: Log in to GHCR
        if: contains(matrix.profiles, inputs.release_test_profile) && (inputs.live_suite_filter == '' || inputs.live_suite_filter == matrix.suite_id || (inputs.live_suite_filter == 'live-gateway-advisory-docker' && startsWith(matrix.suite_id, 'live-gateway-advisory-docker-')))
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Configure suite-specific env
        if: contains(matrix.profiles, inputs.release_test_profile) && (inputs.live_suite_filter == '' || inputs.live_suite_filter == matrix.suite_id || (inputs.live_suite_filter == 'live-gateway-advisory-docker' && startsWith(matrix.suite_id, 'live-gateway-advisory-docker-')))
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ matrix.profile_env_only }}" == "true" ]]; then
            echo "AUTOPUS_DOCKER_PROFILE_ENV_ONLY=1" >> "$GITHUB_ENV"
          fi
          case "${{ matrix.suite_id }}" in
            live-cli-backend-docker)
              echo "AUTOPUS_LIVE_CLI_BACKEND_MODEL=claude-cli/claude-sonnet-4-6" >> "$GITHUB_ENV"
              echo "AUTOPUS_LIVE_CLI_BACKEND_AUTH=api-key" >> "$GITHUB_ENV"
              echo "AUTOPUS_LIVE_CLI_BACKEND_DEBUG=1" >> "$GITHUB_ENV"
              echo "AUTOPUS_CLI_BACKEND_LOG_OUTPUT=1" >> "$GITHUB_ENV"
              echo "AUTOPUS_TEST_CONSOLE=1" >> "$GITHUB_ENV"
              ;;
            live-codex-harness-docker)
              echo "AUTOPUS_LIVE_CODEX_HARNESS_AUTH=api-key" >> "$GITHUB_ENV"
              echo "AUTOPUS_LIVE_CODEX_HARNESS_DEBUG=1" >> "$GITHUB_ENV"
              echo "AUTOPUS_CLI_BACKEND_LOG_OUTPUT=1" >> "$GITHUB_ENV"
              echo "AUTOPUS_TEST_CONSOLE=1" >> "$GITHUB_ENV"
              ;;
            live-acp-bind-docker)
              if [[ -n "${GEMINI_API_KEY:-}" || -n "${GOOGLE_API_KEY:-}" ]]; then
                echo "AUTOPUS_LIVE_ACP_BIND_AGENTS=claude,codex,gemini" >> "$GITHUB_ENV"
              else
                echo "AUTOPUS_LIVE_ACP_BIND_AGENTS=claude,codex" >> "$GITHUB_ENV"
              fi
              ;;
          esac

      - name: Run ${{ matrix.label }}
        if: contains(matrix.profiles, inputs.release_test_profile) && (inputs.live_suite_filter == '' || inputs.live_suite_filter == matrix.suite_id || (inputs.live_suite_filter == 'live-gateway-advisory-docker' && startsWith(matrix.suite_id, 'live-gateway-advisory-docker-')))
        env:
          AUTOPUS_LIVE_COMMAND: ${{ matrix.command }}
          AUTOPUS_LIVE_SUITE_ADVISORY: ${{ matrix.advisory }}
        run: |
          set +e
          bash .release-harness/scripts/ci-live-command-retry.sh
          status=$?
          set -e
          if [[ "$status" -eq 0 ]]; then
            exit 0
          fi
          if [[ "${AUTOPUS_LIVE_SUITE_ADVISORY:-}" == "true" ]]; then
            echo "::warning::Advisory live suite failed with exit code ${status}: ${{ matrix.suite_id }}"
            exit 0
          fi
          exit "$status"

