      BYTEPLUS_API_KEY: ${{ secrets.BYTEPLUS_API_KEY }}
      CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
      DEEPINFRA_API_KEY: ${{ secrets.DEEPINFRA_API_KEY }}
      DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
      MODELSTUDIO_API_KEY: ${{ secrets.MODELSTUDIO_API_KEY }}
      MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}
      MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
      MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
      OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
      OPENCODE_ZEN_API_KEY: ${{ secrets.OPENCODE_ZEN_API_KEY }}
      AUTOPUS_LIVE_BROWSER_CDP_URL: ${{ secrets.AUTOPUS_LIVE_BROWSER_CDP_URL }}
      AUTOPUS_LIVE_SETUP_TOKEN: ${{ secrets.AUTOPUS_LIVE_SETUP_TOKEN }}
      AUTOPUS_LIVE_SETUP_TOKEN_MODEL: ${{ secrets.AUTOPUS_LIVE_SETUP_TOKEN_MODEL }}
      AUTOPUS_LIVE_SETUP_TOKEN_PROFILE: ${{ secrets.AUTOPUS_LIVE_SETUP_TOKEN_PROFILE }}
      AUTOPUS_LIVE_SETUP_TOKEN_VALUE: ${{ secrets.AUTOPUS_LIVE_SETUP_TOKEN_VALUE }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
      FAL_KEY: ${{ secrets.FAL_KEY }}
      RUNWAY_API_KEY: ${{ secrets.RUNWAY_API_KEY }}
      DEEPGRAM_API_KEY: ${{ secrets.DEEPGRAM_API_KEY }}
      TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
      VYDRA_API_KEY: ${{ secrets.VYDRA_API_KEY }}
      XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
      ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}
      Z_AI_API_KEY: ${{ secrets.Z_AI_API_KEY }}
      BYTEPLUS_ACCESS_KEY_ID: ${{ secrets.BYTEPLUS_ACCESS_KEY_ID }}
      BYTEPLUS_SECRET_ACCESS_KEY: ${{ secrets.BYTEPLUS_SECRET_ACCESS_KEY }}
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      AUTOPUS_CODEX_AUTH_JSON: ${{ secrets.AUTOPUS_CODEX_AUTH_JSON }}
      AUTOPUS_CODEX_CONFIG_TOML: ${{ secrets.AUTOPUS_CODEX_CONFIG_TOML }}
      AUTOPUS_CLAUDE_JSON: ${{ secrets.AUTOPUS_CLAUDE_JSON }}
      AUTOPUS_CLAUDE_CREDENTIALS_JSON: ${{ secrets.AUTOPUS_CLAUDE_CREDENTIALS_JSON }}
      AUTOPUS_CLAUDE_SETTINGS_JSON: ${{ secrets.AUTOPUS_CLAUDE_SETTINGS_JSON }}
      AUTOPUS_CLAUDE_SETTINGS_LOCAL_JSON: ${{ secrets.AUTOPUS_CLAUDE_SETTINGS_LOCAL_JSON }}
      AUTOPUS_GEMINI_SETTINGS_JSON: ${{ secrets.AUTOPUS_GEMINI_SETTINGS_JSON }}
      FIREWORKS_API_KEY: ${{ secrets.FIREWORKS_API_KEY }}
      AUTOPUS_DOCKER_E2E_IMAGE: ${{ needs.prepare_docker_e2e_image.outputs.image }}
      AUTOPUS_DOCKER_E2E_BARE_IMAGE: ${{ needs.prepare_docker_e2e_image.outputs.bare_image }}
      AUTOPUS_DOCKER_E2E_FUNCTIONAL_IMAGE: ${{ needs.prepare_docker_e2e_image.outputs.functional_image }}
      AUTOPUS_DOCKER_E2E_PACKAGE_ARTIFACT_NAME: ${{ inputs.package_artifact_name || 'docker-e2e-package' }}
      AUTOPUS_DOCKER_E2E_REPO_ROOT: ${{ github.workspace }}
      AUTOPUS_DOCKER_E2E_SELECTED_SHA: ${{ needs.validate_selected_ref.outputs.selected_sha }}
      AUTOPUS_CURRENT_PACKAGE_TGZ: .artifacts/docker-e2e-package/autopus-current.tgz
      AUTOPUS_UPGRADE_SURVIVOR_BASELINE_SPEC: ${{ inputs.published_upgrade_survivor_baseline }}
      AUTOPUS_UPGRADE_SURVIVOR_BASELINE_SPECS: ${{ matrix.group.published_upgrade_survivor_baselines || inputs.published_upgrade_survivor_baselines }}
      AUTOPUS_UPGRADE_SURVIVOR_SCENARIOS: ${{ inputs.published_upgrade_survivor_scenarios }}
      AUTOPUS_SKIP_DOCKER_BUILD: "1"
      INCLUDE_OPENWEBUI: ${{ inputs.include_openwebui }}
      DOCKER_E2E_LANES: ${{ matrix.group.docker_lanes }}
    steps:
      - name: Checkout selected ref
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.validate_selected_ref.outputs.selected_sha }}
          fetch-depth: 1

      - name: Checkout trusted release harness
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1
          path: .release-harness

      - name: Log in to GHCR for shared Docker E2E image
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Setup Node environment
        uses: ./.github/actions/setup-node-env
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}
          install-bun: "true"

      - name: Hydrate live auth/profile inputs
        run: bash scripts/ci-hydrate-live-auth.sh

      - name: Plan targeted Docker E2E lanes
        id: plan
        shell: bash
        env:
          LANES: ${{ matrix.group.docker_lanes }}
          GROUP_LABEL: ${{ matrix.group.label }}
          INCLUDE_OPENWEBUI: ${{ inputs.include_openwebui }}
          INCLUDE_RELEASE_PATH_SUITES: ${{ inputs.include_release_path_suites }}
        run: |
          set -euo pipefail
          if [[ -z "$LANES" ]]; then
            echo "lanes input is required for Docker E2E targeted planning." >&2
            exit 1
          fi

          mkdir -p .artifacts/docker-tests
          export AUTOPUS_DOCKER_ALL_LANES="$LANES"
          export AUTOPUS_DOCKER_ALL_INCLUDE_OPENWEBUI="$INCLUDE_OPENWEBUI"
          if [[ "$INCLUDE_RELEASE_PATH_SUITES" == "true" ]]; then
            export AUTOPUS_DOCKER_ALL_PROFILE=release-path
          fi

          plan_path=".artifacts/docker-tests/targeted-plan.json"
          node .release-harness/scripts/test-docker-all.mjs --plan-json > "$plan_path"
          node .release-harness/scripts/docker-e2e.mjs github-outputs "$plan_path" >> "$GITHUB_OUTPUT"
          suffix="$(printf '%s' "${GROUP_LABEL:-$LANES}" | tr ',[:space:]' '-' | tr -cd 'A-Za-z0-9._-' | sed -E 's/-+/-/g; s/^-//; s/-$//')"
          echo "artifact_suffix=${suffix:-targeted}" >> "$GITHUB_OUTPUT"
          echo "plan_json=$plan_path" >> "$GITHUB_OUTPUT"

      - name: Download Autopus Docker E2E package
        if: steps.plan.outputs.needs_package == '1'
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.package_artifact_name || 'docker-e2e-package' }}
          path: .artifacts/docker-e2e-package

      - name: Pull shared bare Docker E2E image
        if: steps.plan.outputs.needs_bare_image == '1'
        shell: bash
        run: |
          set -euo pipefail
          bash .release-harness/scripts/ci-docker-pull-retry.sh "${AUTOPUS_DOCKER_E2E_BARE_IMAGE}"

      - name: Pull shared functional Docker E2E image
        if: steps.plan.outputs.needs_functional_image == '1'
        shell: bash
        run: |
          set -euo pipefail
          bash .release-harness/scripts/ci-docker-pull-retry.sh "${AUTOPUS_DOCKER_E2E_FUNCTIONAL_IMAGE}"

      - name: Validate Docker E2E credentials
        shell: bash
        env:
          CREDENTIALS: ${{ steps.plan.outputs.credentials }}
        run: |
          set -euo pipefail
          credentials=",$CREDENTIALS,"
          if [[ "$credentials" == *",openai,"* ]]; then
            [[ -n "${OPENAI_API_KEY:-}" ]] || {
              echo "OPENAI_API_KEY is required for selected Docker E2E lanes." >&2
              exit 1
            }
          fi
          if [[ "$credentials" == *",anthropic,"* && -z "${ANTHROPIC_API_TOKEN:-}" && -z "${ANTHROPIC_API_KEY:-}" ]]; then
            echo "ANTHROPIC_API_TOKEN or ANTHROPIC_API_KEY is required for selected Docker E2E lanes." >&2
            exit 1
          fi

      - name: Run targeted Docker E2E lanes
        shell: bash
        run: |
          set -euo pipefail
          export AUTOPUS_DOCKER_ALL_LANES="${DOCKER_E2E_LANES}"
          export AUTOPUS_DOCKER_ALL_PREFLIGHT=0
          export AUTOPUS_DOCKER_ALL_FAIL_FAST=0
          export AUTOPUS_DOCKER_ALL_INCLUDE_OPENWEBUI="${INCLUDE_OPENWEBUI}"
          if [[ "${{ inputs.include_release_path_suites }}" == "true" ]]; then
            export AUTOPUS_DOCKER_ALL_PROFILE=release-path
          fi
          export AUTOPUS_DOCKER_ALL_LOG_DIR=".artifacts/docker-tests/targeted-${{ steps.plan.outputs.artifact_suffix }}"
          export AUTOPUS_DOCKER_ALL_TIMINGS_FILE=".artifacts/docker-tests/targeted-${{ steps.plan.outputs.artifact_suffix }}-timings.json"
          export AUTOPUS_DOCKER_ALL_PNPM_COMMAND="$(command -v pnpm)"
          if [[ "${{ steps.plan.outputs.needs_live_image }}" == "1" ]]; then
            AUTOPUS_DOCKER_BUILD_ON_MISSING=1 AUTOPUS_LIVE_DOCKER_REPO_ROOT="$GITHUB_WORKSPACE" bash .release-harness/scripts/test-live-build-docker.sh
          fi
          export AUTOPUS_DOCKER_ALL_BUILD=0

          node .release-harness/scripts/test-docker-all.mjs

      - name: Summarize targeted Docker E2E lanes
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          summary=".artifacts/docker-tests/targeted-${{ steps.plan.outputs.artifact_suffix }}/summary.json"
          if [[ ! -f "$summary" ]]; then
            echo "Docker targeted summary missing: \`$summary\`" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          node .release-harness/scripts/docker-e2e.mjs summary "$summary" "Docker E2E targeted lanes" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload targeted Docker E2E artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: docker-e2e-${{ steps.plan.outputs.artifact_suffix }}
          path: .artifacts/docker-tests/
          if-no-files-found: ignore

