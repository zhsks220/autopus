      ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}
      Z_AI_API_KEY: ${{ secrets.Z_AI_API_KEY }}
      BYTEPLUS_ACCESS_KEY_ID: ${{ secrets.BYTEPLUS_ACCESS_KEY_ID }}
      BYTEPLUS_SECRET_ACCESS_KEY: ${{ secrets.BYTEPLUS_SECRET_ACCESS_KEY }}
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      AUTOPUS_CODEX_AUTH_JSON: ${{ secrets.AUTOPUS_CODEX_AUTH_JSON }}
      AUTOPUS_CODEX_CONFIG_TOML: ${{ secrets.AUTOPUS_CODEX_CONFIG_TOML }}
      AUTOPUS_CLAUDE_JSON: ${{ secrets.AUTOPUS_CLAUDE_JSON }}
      AUTOPUS_CLAUDE_CREDENTIALS_JSON: ${{ secrets.AUTOPUS_CLAUDE_CREDENTIALS_JSON }}
      AUTOPUS_CLAUDE_SETTINGS_JSON: ${{ secrets.AUTOPUS_CLAUDE_SETTINGS_JSON }}
      AUTOPUS_CLAUDE_SETTINGS_LOCAL_JSON: ${{ secrets.AUTOPUS_CLAUDE_SETTINGS_LOCAL_JSON }}
      AUTOPUS_GEMINI_SETTINGS_JSON: ${{ secrets.AUTOPUS_GEMINI_SETTINGS_JSON }}
      FIREWORKS_API_KEY: ${{ secrets.FIREWORKS_API_KEY }}
      AUTOPUS_DOCKER_E2E_IMAGE: ${{ needs.prepare_docker_e2e_image.outputs.image }}
      AUTOPUS_DOCKER_E2E_BARE_IMAGE: ${{ needs.prepare_docker_e2e_image.outputs.bare_image }}
      AUTOPUS_DOCKER_E2E_FUNCTIONAL_IMAGE: ${{ needs.prepare_docker_e2e_image.outputs.functional_image }}
      AUTOPUS_DOCKER_E2E_PACKAGE_ARTIFACT_NAME: ${{ inputs.package_artifact_name || 'docker-e2e-package' }}
      AUTOPUS_DOCKER_E2E_REPO_ROOT: ${{ github.workspace }}
      AUTOPUS_DOCKER_E2E_SELECTED_SHA: ${{ needs.validate_selected_ref.outputs.selected_sha }}
      AUTOPUS_DOCKER_ALL_RELEASE_PROFILE: ${{ inputs.release_test_profile }}
      AUTOPUS_CURRENT_PACKAGE_TGZ: .artifacts/docker-e2e-package/autopus-current.tgz
      AUTOPUS_UPGRADE_SURVIVOR_BASELINE_SPEC: ${{ inputs.published_upgrade_survivor_baseline }}
      AUTOPUS_UPGRADE_SURVIVOR_BASELINE_SPECS: ${{ inputs.published_upgrade_survivor_baselines }}
      AUTOPUS_UPGRADE_SURVIVOR_SCENARIOS: ${{ inputs.published_upgrade_survivor_scenarios }}
      AUTOPUS_SKIP_DOCKER_BUILD: "1"
      INCLUDE_OPENWEBUI: ${{ inputs.include_openwebui }}
      DOCKER_E2E_CHUNK: ${{ matrix.chunk_id }}
    steps:
      - name: Checkout selected ref
        if: contains(matrix.profiles, inputs.release_test_profile)
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.validate_selected_ref.outputs.selected_sha }}
          fetch-depth: 1

      - name: Checkout trusted release harness
        if: contains(matrix.profiles, inputs.release_test_profile)
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1
          path: .release-harness

      - name: Log in to GHCR for shared Docker E2E image
        if: contains(matrix.profiles, inputs.release_test_profile)
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Setup Node environment
        if: contains(matrix.profiles, inputs.release_test_profile)
        uses: ./.github/actions/setup-node-env
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}
          install-bun: "true"

      - name: Hydrate live auth/profile inputs
        if: contains(matrix.profiles, inputs.release_test_profile)
        run: bash scripts/ci-hydrate-live-auth.sh

      - name: Plan Docker E2E chunk
        if: contains(matrix.profiles, inputs.release_test_profile)
        id: plan
        shell: bash
        env:
          CHUNK: ${{ matrix.chunk_id }}
          INCLUDE_OPENWEBUI: ${{ inputs.include_openwebui }}
          RELEASE_TEST_PROFILE: ${{ inputs.release_test_profile }}
        run: |
          set -euo pipefail
          if [[ -z "$CHUNK" ]]; then
            echo "chunk input is required for Docker E2E chunk planning." >&2
            exit 1
          fi

          mkdir -p .artifacts/docker-tests
          export AUTOPUS_DOCKER_ALL_PROFILE=release-path
          export AUTOPUS_DOCKER_ALL_CHUNK="$CHUNK"
          export AUTOPUS_DOCKER_ALL_INCLUDE_OPENWEBUI="$INCLUDE_OPENWEBUI"
          export AUTOPUS_DOCKER_ALL_RELEASE_PROFILE="$RELEASE_TEST_PROFILE"

          plan_path=".artifacts/docker-tests/release-${CHUNK}-plan.json"
          node .release-harness/scripts/test-docker-all.mjs --plan-json > "$plan_path"
          node .release-harness/scripts/docker-e2e.mjs github-outputs "$plan_path" >> "$GITHUB_OUTPUT"
          echo "plan_json=$plan_path" >> "$GITHUB_OUTPUT"

      - name: Download Autopus Docker E2E package
        if: contains(matrix.profiles, inputs.release_test_profile) && steps.plan.outputs.needs_package == '1'
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.package_artifact_name || 'docker-e2e-package' }}
          path: .artifacts/docker-e2e-package

      - name: Pull shared bare Docker E2E image
        if: contains(matrix.profiles, inputs.release_test_profile) && steps.plan.outputs.needs_bare_image == '1'
        shell: bash
        run: |
          set -euo pipefail
          bash .release-harness/scripts/ci-docker-pull-retry.sh "${AUTOPUS_DOCKER_E2E_BARE_IMAGE}"

      - name: Pull shared functional Docker E2E image
        if: contains(matrix.profiles, inputs.release_test_profile) && steps.plan.outputs.needs_functional_image == '1'
        shell: bash
        run: |
          set -euo pipefail
          bash .release-harness/scripts/ci-docker-pull-retry.sh "${AUTOPUS_DOCKER_E2E_FUNCTIONAL_IMAGE}"

      - name: Validate Docker E2E credentials
        if: contains(matrix.profiles, inputs.release_test_profile)
        shell: bash
        env:
          CREDENTIALS: ${{ steps.plan.outputs.credentials }}
        run: |
          set -euo pipefail
          credentials=",$CREDENTIALS,"
          if [[ "$credentials" == *",openai,"* ]]; then
            [[ -n "${OPENAI_API_KEY:-}" ]] || {
              echo "OPENAI_API_KEY is required for selected Docker E2E lanes." >&2
              exit 1
            }
          fi
          if [[ "$credentials" == *",anthropic,"* && -z "${ANTHROPIC_API_TOKEN:-}" && -z "${ANTHROPIC_API_KEY:-}" ]]; then
            echo "ANTHROPIC_API_TOKEN or ANTHROPIC_API_KEY is required for selected Docker E2E lanes." >&2
            exit 1
          fi

      - name: Run Docker E2E chunk
        if: contains(matrix.profiles, inputs.release_test_profile)
        shell: bash
        run: |
          set -euo pipefail
          export AUTOPUS_DOCKER_ALL_PROFILE=release-path
          export AUTOPUS_DOCKER_ALL_CHUNK="${DOCKER_E2E_CHUNK}"
          export AUTOPUS_DOCKER_ALL_RELEASE_PROFILE="${AUTOPUS_DOCKER_ALL_RELEASE_PROFILE}"
          export AUTOPUS_DOCKER_ALL_BUILD=0
          export AUTOPUS_DOCKER_ALL_PREFLIGHT=0
          export AUTOPUS_DOCKER_ALL_FAIL_FAST=0
          export AUTOPUS_DOCKER_ALL_INCLUDE_OPENWEBUI="${INCLUDE_OPENWEBUI}"
          export AUTOPUS_DOCKER_ALL_LOG_DIR=".artifacts/docker-tests/release-${DOCKER_E2E_CHUNK}"
          export AUTOPUS_DOCKER_ALL_TIMINGS_FILE=".artifacts/docker-tests/release-${DOCKER_E2E_CHUNK}-timings.json"
          export AUTOPUS_DOCKER_ALL_PNPM_COMMAND="$(command -v pnpm)"
          if [[ "${{ steps.plan.outputs.needs_live_image }}" == "1" ]]; then
            AUTOPUS_DOCKER_BUILD_ON_MISSING=1 AUTOPUS_LIVE_DOCKER_REPO_ROOT="$GITHUB_WORKSPACE" bash .release-harness/scripts/test-live-build-docker.sh
          fi

          node .release-harness/scripts/test-docker-all.mjs

      - name: Summarize Docker E2E chunk
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          summary=".artifacts/docker-tests/release-${DOCKER_E2E_CHUNK}/summary.json"
          if [[ ! -f "$summary" ]]; then
            echo "Docker chunk summary missing: \`$summary\`" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          node .release-harness/scripts/docker-e2e.mjs summary "$summary" "Docker E2E chunk: ${DOCKER_E2E_CHUNK:-unknown}" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Docker E2E chunk artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: docker-e2e-${{ matrix.chunk_id }}
          path: .artifacts/docker-tests/
          if-no-files-found: ignore

  plan_docker_lane_groups:
    needs: validate_selected_ref
    if: inputs.docker_lanes != ''
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 5
    outputs:
      groups_json: ${{ steps.groups.outputs.groups_json }}
    steps:
      - name: Checkout trusted release harness
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1

      - name: Build targeted Docker lane groups
        id: groups
        shell: bash
        env:
          LANES: ${{ inputs.docker_lanes }}
          GROUP_SIZE: ${{ inputs.targeted_docker_lane_group_size }}
          AUTOPUS_UPGRADE_SURVIVOR_BASELINE_SPECS: ${{ inputs.published_upgrade_survivor_baselines }}
        run: |
          set -euo pipefail
          groups_json="$(node scripts/plan-targeted-docker-lane-groups.mjs)"
          echo "groups_json=${groups_json}" >> "$GITHUB_OUTPUT"

  validate_docker_lanes:
    needs: [validate_selected_ref, prepare_docker_e2e_image, plan_docker_lane_groups]
    if: inputs.docker_lanes != ''
    name: Docker E2E targeted lanes (${{ matrix.group.label }})
    runs-on: blacksmith-32vcpu-ubuntu-2404
