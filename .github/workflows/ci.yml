          install-bun: "false"

      - name: Configure Node test resources
        run: echo "AUTOPUS_VITEST_MAX_WORKERS=2" >> "$GITHUB_ENV"

      - name: Run Node test shard
        env:
          NODE_OPTIONS: --max-old-space-size=8192
