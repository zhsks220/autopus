            childEnv.AUTOPUS_VITEST_INCLUDE_FILE = includeFile;
          }

          const result = spawnSync("pnpm", ["exec", "node", "scripts/test-projects.mjs", ...configs], {
            env: childEnv,
            stdio: "inherit",
          });
          if ((result.status ?? 1) !== 0) {
            process.exit(result.status ?? 1);
