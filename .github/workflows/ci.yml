          AUTOPUS_NODE_TEST_INCLUDE_PATTERNS_JSON: ${{ toJson(matrix.includePatterns) }}
          AUTOPUS_VITEST_SHARD_NAME: ${{ matrix.shard_name }}
          AUTOPUS_TEST_PROJECTS_PARALLEL: "2"
        shell: bash
