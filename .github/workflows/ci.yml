            process.exit(1);
          }
          const includePatterns = JSON.parse(process.env.AUTOPUS_NODE_TEST_INCLUDE_PATTERNS_JSON ?? "null");
          const childEnv = { ...process.env };
          if (Array.isArray(includePatterns) && includePatterns.length > 0) {
