name: autopus-codeql-memory-runtime-boundary-critical-quality

disable-default-queries: true

queries:
  - uses: security-and-quality

query-filters:
  - include:
      problem.severity:
        - error
  - exclude:
      tags:
        - security

paths:
  - packages/memory-host-sdk/src
  - src/memory
  - src/memory-host-sdk
  - src/plugin-sdk/memory-*.ts
  - src/plugin-sdk/memory-core-host-*.ts
  - src/plugins/memory-*.ts
  - src/gateway/server-startup-memory.ts
  - src/commands/doctor-memory-search.ts
  - src/commands/doctor-cron-dreaming-payload-migration.ts

paths-ignore:
  - "**/node_modules"
  - "**/coverage"
  - "**/*.generated.ts"
  - "**/*.bundle.js"
  - "**/*-runtime.js"
  - "**/*.test.ts"
  - "**/*.test.tsx"
  - "**/*.e2e.test.ts"
  - "**/*.e2e.test.tsx"
  - "**/*test-support*"
  - "**/*test-helper*"
  - "**/*mock*"
  - "**/*fixture*"
  - "**/*bench*"
